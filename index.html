<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeO Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .qty-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-slate-50 pb-72">
    <div class="max-w-md mx-auto p-6">
        <header class="mb-8 text-center flex justify-between items-center">
            <h1 class="text-5xl font-800 tracking-tighter italic text-slate-900">Bake<span class="text-orange-600 not-italic">O</span></h1>
            <button onclick="resetForm()" class="text-[10px] font-bold bg-slate-200 text-slate-500 px-3 py-2 rounded-full uppercase tracking-widest active:bg-red-100 active:text-red-600">Clear Form</button>
        </header>

        <div id="snack-list" class="space-y-4 mb-10"></div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Customer Details</h2>
            <input type="text" id="cust-name" placeholder="Customer Name (Optional)" 
                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all mb-2">
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 mb-6 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Payment Info</p>
            <p class="text-xs font-bold text-slate-700 select-all">UPI: <span class="text-orange-600">9704687181@upi</span></p>
            <div id="summary-items" class="mt-4 text-sm text-slate-600 space-y-2 border-t border-dashed pt-4"></div>
            <div class="mt-4 flex justify-between font-bold text-xl px-2"><span>Total:</span><span id="grand-total" class="text-orange-600">₹0</span></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/90 backdrop-blur-md border-t border-slate-100 shadow-2xl z-10">
        <div class="max-w-md mx-auto space-y-3">
            <div class="relative flex items-center">
                <span class="absolute left-4 font-mono text-lg text-slate-400 border-r pr-2">+91</span>
                <input type="tel" id="cust-phone" placeholder="10 Digits" 
                    class="w-full p-4 pl-16 bg-slate-50 border border-slate-200 rounded-2xl font-mono text-lg outline-none focus:ring-2 focus:ring-orange-500 transition-all">
            </div>
            <button onclick="sendOrder()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 text-lg transition-transform">Send WhatsApp Receipt</button>
        </div>
    </div>

    <script>
        let snacks = [
            { name: "Jowar Crackers", qty: 0, price: 149, edit: false },
            { name: "Millet Crackers", qty: 0, price: 149, edit: false },
            { name: "Rice Crackers", qty: 0, price: 149, edit: false },
            { name: "Moong Dal Chips", qty: 0, price: 149, edit: false },
            { name: "Ragi Chips", qty: 0, price: 149, edit: false },
            { name: "Ragi Laddu", qty: 0, price: 129, edit: true }
        ];

        function render() {
            const list = document.getElementById('snack-list');
            const summary = document.getElementById('summary-items');
            list.innerHTML = ''; summary.innerHTML = '';
            let total = 0;

            snacks.forEach((item, i) => {
                let sub = item.qty * item.price; total += sub;
                let nameBox = item.edit ? `<input type="text" value="${item.name}" onchange="snacks[${i}].name=this.value;render()" class="font-bold text-lg bg-transparent border-b border-dashed border-slate-300 outline-none w-full">` : `<h3 class="font-bold text-lg text-slate-800">${item.name}</h3>`;
                list.innerHTML += `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex-1 mr-2">${nameBox}
                            <div class="flex items-center gap-2 mt-1">
                                <button onclick="changePrice(${i},-5)" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full font-bold text-slate-400 active:bg-orange-100 active:text-orange-600">-</button>
                                <span class="text-sm font-bold text-orange-600">₹${item.price}</span>
                                <button onclick="changePrice(${i},5)" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full font-bold text-slate-400 active:bg-orange-100 active:text-orange-600">+</button>
                            </div>
                        </div>
                        <span class="font-800 text-slate-900">₹${sub}</span>
                    </div>
                    <div class="flex justify-between bg-slate-50 rounded-2xl p-1">
                        <button onclick="changeQty(${i},-1)" class="qty-btn w-14 h-14 flex items-center justify-center text-2xl font-black text-slate-300 active:text-orange-600 transition-colors">-</button>
                        <span class="text-xl font-black self-center text-slate-800">${item.qty}</span>
                        <button onclick="changeQty(${i},1)" class="qty-btn w-14 h-14 flex items-center justify-center text-2xl font-black text-slate-300 active:text-orange-600 transition-colors">+</button>
                    </div>
                </div>`;
                if(item.qty > 0) summary.innerHTML += `<div class="flex justify-between"><span>${item.name} (x${item.qty})</span><span class="font-bold text-slate-900">₹${sub}</span></div>`;
            });
            document.getElementById('grand-total').innerText = `₹${total}`;
        }

        function resetForm() {
            if(confirm("Clear current order?")) {
                snacks.forEach(s => s.qty = 0);
                document.getElementById('cust-name').value = '';
                document.getElementById('cust-phone').value = '';
                render();
            }
        }

        function changeQty(i, a) { snacks[i].qty = Math.max(0, snacks[i].qty + a); render(); }
        function changePrice(i, a) { snacks[i].price = Math.max(0, snacks[i].price + a); render(); }
        
        function sendOrder() {
            const digits = document.getElementById('cust-phone').value.replace(/\D/g,'');
            if(digits.length < 10) return alert("Please enter a valid 10-digit number.");
            const phone = "91" + digits.slice(-10);
            const name = document.getElementById('cust-name').value.trim();
            let greeting = name ? `*Dear ${name},*` : `*Dear Sir/Madam,*`;
            let msg = `🛒 *BAKEO SNACKS*%0A${greeting}%0A---------------------------%0A`;
            let has = false;
            snacks.forEach(s => { if(s.qty > 0) { has = true; msg += `✅ *${s.name}* (x${s.qty}) - ₹${s.qty * s.price}%0A`; }});
            if(!has) return alert("Select at least one snack!");
            msg += `---------------------------%0A💰 *TOTAL: ₹${document.getElementById('grand-total').innerText.split('₹')[1]}*%0A%0A💳 *UPI:* 9704687181@upi%0A%0AThank you for snacking with *BakeO*!Follow Us: https://instagram.com/bakeosnacks 🙏`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
        render();
    </script>
</body>
</html>
