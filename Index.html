<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeO Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-20">

    <div class="max-w-md mx-auto px-6 py-10">
        <header class="mb-8 text-center">
            <h1 class="text-5xl font-800 tracking-tighter italic">Bake<span class="text-orange-600 not-italic">O</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Professional Billing</p>
        </header>

        <div id="snack-container" class="space-y-4">
            </div>

        <div class="mt-10 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <div class="flex justify-between items-baseline mb-6">
                <span class="text-slate-400 font-bold text-xs uppercase tracking-widest">Grand Total</span>
                <span id="grand-total" class="text-4xl font-800 text-slate-900 tracking-tighter">₹0</span>
            </div>

            <div class="space-y-4">
                <input type="tel" id="cust-phone" placeholder="91 + Customer Number" 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl font-mono text-center text-lg outline-none focus:ring-2 focus:ring-orange-100 transition-all">
                
                <button onclick="sendWhatsApp()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-orange-600 transition-all active:scale-95 text-lg">
                    Send Receipt
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-300 mt-4 uppercase font-bold tracking-widest italic">Thank you for snacking with BakeO!</p>
        </div>
    </div>

    <script>
        const snackNames = [
            "Jowar Crackers", 
            "Millet Crackers", 
            "Rice Crackers", 
            "Moong Dal Chips", 
            "Ragi Chips"
        ];

        const container = document.getElementById('snack-container');
        const state = snackNames.map(name => ({ name, qty: 0, price: 170 }));

        function render() {
            container.innerHTML = '';
            let total = 0;

            state.forEach((item, index) => {
                const subtotal = item.qty * item.price;
                total += subtotal;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-800 text-slate-800 text-lg leading-tight">${item.name}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <button onclick="updatePrice(${index}, -5)" class="w-6 h-6 rounded-full bg-slate-100 text-slate-500 font-bold text-xs">-</button>
                                <span class="text-xs font-bold text-orange-600">₹${item.price}</span>
                                <button onclick="updatePrice(${index}, 5)" class="w-6 h-6 rounded-full bg-slate-100 text-slate-500 font-bold text-xs">+</button>
                            </div>
                        </div>
                        <div class="text-right text-xs font-bold text-slate-300 uppercase tracking-tighter">Sub: ₹${subtotal}</div>
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 rounded-2xl p-1">
                        <button onclick="updateQty(${index}, -1)" class="w-12 h-12 flex items-center justify-center font-black text-2xl text-slate-400 hover:text-orange-600">-</button>
                        <span class="font-black text-xl text-slate-800">${item.qty}</span>
                        <button onclick="updateQty(${index}, 1)" class="w-12 h-12 flex items-center justify-center font-black text-2xl text-slate-400 hover:text-orange-600">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('grand-total').innerText = `₹${total}`;
        }

        function updateQty(index, change) {
            state[index].qty = Math.max(0, state[index].qty + change);
            render();
        }

        function updatePrice(index, change) {
            state[index].price = Math.max(0, state[index].price + change);
            render();
        }

        function sendWhatsApp() {
            const phone = document.getElementById('cust-phone').value.replace(/\D/g,'');
            if(!phone || phone.length < 10) { alert("Enter Phone Number"); return; }

            let msg = "✨ *BAKEO SNACKS RECEIPT* ✨%0A---------------------------%0A";
            let grandTotal = 0;
            let hasItems = false;

            state.forEach(item => {
                if(item.qty > 0) {
                    hasItems = true;
                    let sub = item.qty * item.price;
                    grandTotal += sub;
                    msg += `• *${item.name}*%0A  ${item.qty} packs x ₹${item.price} = ₹${sub}%0A`;
                }
            });

            if(!hasItems) { alert("Select snacks first!"); return; }

            msg += "---------------------------%0A";
            msg += `💰 *TOTAL PAYABLE: ₹${grandTotal}*%0A%0A`;
            msg += "Thank you for snacking with BakeO! 🙏";

            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        render();
    </script>
</body>
</html>
