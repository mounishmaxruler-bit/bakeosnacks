<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeO Summary & Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .qty-btn:active { transform: scale(0.9); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 pb-64">

    <div class="max-w-md mx-auto p-6">
        <header class="mb-8 text-center">
            <h1 class="text-5xl font-800 tracking-tighter italic text-slate-900">Bake<span class="text-orange-600 not-italic">O</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Professional Billing Dash</p>
        </header>

        <div id="snack-list" class="space-y-4 mb-10"></div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Customer Details</h2>
            <input type="text" id="cust-name" placeholder="Customer Name (Optional)" 
                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all mb-2">
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Order Summary</h2>
            
            <div id="summary-items" class="space-y-2 text-sm text-slate-600 mb-4"></div>
            
            <div class="pt-4 border-t border-dashed border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <span class="font-bold text-slate-900">Grand Total:</span>
                    <span id="grand-total" class="text-3xl font-800 text-orange-600">₹0</span>
                </div>
                
                <div class="bg-slate-50 rounded-3xl p-6 text-center border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Payment Info</p>
                    <div class="inline-block bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
                        <p class="text-xs font-bold text-slate-700">UPI: <span class="text-orange-600">9704687181@upi</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md border-t border-slate-100 shadow-2xl z-10">
        <div class="max-w-md mx-auto space-y-3">
            <div class="relative flex items-center">
                <span class="absolute left-4 font-mono text-lg text-slate-400 border-r pr-2 border-slate-200">+91</span>
                <input type="tel" id="cust-phone" placeholder="Enter 10 Digits" 
                    class="w-full p-4 pl-16 bg-slate-50 border border-slate-200 rounded-2xl font-mono text-lg outline-none focus:ring-2 focus:ring-orange-500 transition-all">
            </div>
            <button onclick="sendOrder()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg tracking-tight">
                Send WhatsApp Receipt
            </button>
        </div>
    </div>

    <script>
        let snacks = [
            { name: "Jowar Crackers", qty: 0, price: 170, editable: false },
            { name: "Millet Crackers", qty: 0, price: 170, editable: false },
            { name: "Rice Crackers", qty: 0, price: 170, editable: false },
            { name: "Moong Dal Chips", qty: 0, price: 170, editable: false },
            { name: "Ragi Chips", qty: 0, price: 170, editable: false },
            { name: "Special Snack", qty: 0, price: 170, editable: true }
        ];

        function render() {
            const list = document.getElementById('snack-list');
            const summary = document.getElementById('summary-items');
            list.innerHTML = '';
            summary.innerHTML = '';
            let total = 0;
            let hasItems = false;

            snacks.forEach((item, index) => {
                const sub = item.qty * item.price;
                total += sub;

                let nameHTML = item.editable 
                    ? `<input type="text" value="${item.name}" onchange="updateName(${index}, this.value)" class="font-bold text-slate-800 text-lg bg-transparent border-b border-dashed border-slate-300 outline-none focus:border-orange-500 w-full">`
                    : `<h3 class="font-bold text-slate-800 text-lg">${item.name}</h3>`;

                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex-1 mr-2">
                                ${nameHTML}
                                <div class="flex items-center gap-2 mt-1">
                                    <button onclick="changePrice(${index}, -5)" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 font-bold active:bg-orange-100">-</button>
                                    <span class="text-sm font-bold text-orange-600">₹${item.price}</span>
                                    <button onclick="changePrice(${index}, 5)" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 font-bold active:bg-orange-100">+</button>
                                </div>
                            </div>
                            <span class="text-base font-800 text-slate-900">₹${sub}</span>
                        </div>
                        <div class="flex items-center justify-between bg-slate-50 rounded-2xl p-1">
                            <button onclick="changeQty(${index}, -1)" class="qty-btn w-14 h-14 flex items-center justify-center text-2xl font-black text-slate-300 hover:text-orange-600 transition-colors">-</button>
                            <span class="text-xl font-black text-slate-800">${item.qty}</span>
                            <button onclick="changeQty(${index}, 1)" class="qty-btn w-14 h-14 flex items-center justify-center text-2xl font-black text-slate-300 hover:text-orange-600 transition-colors">+</button>
                        </div>
                    </div>`;

                if(item.qty > 0) {
                    hasItems = true;
                    summary.innerHTML += `
                        <div class="flex justify-between font-medium">
                            <span>${item.name} (x${item.qty})</span>
                            <span class="text-slate-900 font-bold">₹${sub}</span>
                        </div>`;
                }
            });

            if(!hasItems) {
                summary.innerHTML = '<p class="italic text-slate-300 text-center py-2">No items selected yet...</p>';
            }
            document.getElementById('grand-total').innerText = `₹${total}`;
        }

        function updateName(i, val) {
            snacks[i].name = val;
            render();
        }

        function changeQty(i, a) { 
            snacks[i].qty = Math.max(0, snacks[i].qty + a); 
            render(); 
        }
        
        function changePrice(i, a) { 
            snacks[i].price = Math.max(0, snacks[i].price + a); 
            render(); 
        }

        function sendOrder() {
            const phoneInput = document.getElementById('cust-phone').value.trim();
            const enteredName = document.getElementById('cust-name').value.trim();
            
            // Extract only the digits
            let cleanDigits = phoneInput.replace(/\D/g,'');
            
            // Logic: If user types 10 digits, add the 91 prefix.
            let finalPhone = cleanDigits;
            if (cleanDigits.length === 10) {
                finalPhone = "91" + cleanDigits;
            } else if (cleanDigits.length < 10) {
                alert("Please enter a valid 10-digit phone number"); 
                return; 
            }
            
            let greeting = enteredName ? `*Dear ${enteredName},*` : `*Dear Sir/Madam,*`;
            
            let receipt = `🛒 *BAKEO SNACKS RECEIPT*%0A`;
            receipt += `${greeting}%0A`;
            receipt += `---------------------------%0A`;
            
            let total = 0;
            let items = false;
            
            snacks.forEach(s => {
                if(s.qty > 0) {
                    items = true;
                    let sub = s.qty * s.price;
                    total += sub;
                    receipt += `✅ *${s.name}* (x${s.qty}) - ₹${sub}%0A`;
                }
            });
            
            if(!items) { 
                alert("Please select at least one snack!"); 
                return; 
            }
            
            receipt += "---------------------------%0A";
            receipt += `💰 *TOTAL PAYABLE: ₹${total}*%0A%0A`;
            receipt += "💳 *PAYMENT INFO*%0A";
            receipt += "UPI ID: 9704687181@upi%0A%0A";
            receipt += `Thank you for snacking with *BakeO*! 🙏`;
            
            window.open(`https://wa.me/${finalPhone}?text=${receipt}`, '_blank');
        }
        
        render();
    </script>
</body>
</html>
